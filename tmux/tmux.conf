set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -s extended-keys on
set -as terminal-features 'xterm-ghostty:extkeys'

set -s escape-time 0
set -g focus-events on
set -g history-limit 50000
set -g display-time 3000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
bind -n WheelUpPane if-shell -Ft= "#{alternate_on}" "send-keys -M" "select-pane -t=; copy-mode -e; send-keys -M"
bind -n WheelDownPane if-shell -Ft= "#{alternate_on}" "send-keys -M" "select-pane -t="
set -g set-clipboard on
set -g allow-passthrough on
set-environment -g SNACKS_GHOSTTY true
set -g detach-on-destroy off
set -g default-command "${SHELL}"
set -g update-environment "SSH_AUTH_SOCK SSH_CONNECTION DISPLAY TERM_PROGRAM"

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind -r n next-window
bind -r p previous-window
bind -r C-n swap-window -t +1\; select-window -t +1
bind -r C-p swap-window -t -1\; select-window -t -1
bind Tab last-window
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind x kill-pane
bind X kill-window
bind > swap-pane -D
bind < swap-pane -U
bind j command-prompt -p "join pane from:" "join-pane -h -s '%%'"
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi Escape send-keys -X clear-selection
bind -T copy-mode-vi / command-prompt -i -p "(search down)" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi ? command-prompt -i -p "(search up)" "send -X search-backward-incremental \"%%%\""
bind s run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 55%,60% \
    --no-sort --ansi --border-label ' sesh ' --prompt '  ' \
    --header '  ^a all  ^t tmux  ^x zoxide  ^d kill' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(  )+reload(sesh list -ti)' \
    --bind 'ctrl-x:change-prompt(  )+reload(sesh list -zi)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(  )+reload(sesh list --icons)'
)\""
bind L run-shell "sesh last"

bind g if-shell -F '#{==:#{session_name},lazygit}' {
    detach-client
} {
    display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "tmux new-session -A -s lazygit -c '#{pane_current_path}' 'lazygit'"
}

bind D detach-client
bind d if-shell -F '#{==:#{session_name},lazydocker}' {
    detach-client
} {
    display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "tmux new-session -A -s lazydocker -c '#{pane_current_path}' 'lazydocker'"
}

bind S if-shell -F '#{==:#{session_name},lazysql}' {
    detach-client
} {
    display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "tmux new-session -A -s lazysql -c '#{pane_current_path}' 'lazysql'"
}

bind ` if-shell -F '#{==:#{session_name},scratch}' {
    detach-client
} {
    display-popup -E -w 80% -h 70% -d "#{pane_current_path}" "tmux new-session -A -s scratch -c '#{pane_current_path}'"
}

set -s user-keys[0] "\033[k"
bind-key -n User0 send-keys C-l \; run-shell -b "sleep 0.05 && tmux clear-history"
bind b send-keys C-l \; run-shell -b "sleep 0.05 && tmux clear-history"

set-hook -g pane-focus-out 'if -F "#{pane_in_mode}" "send-keys -X cancel"'

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# terminal overrides
set -as terminal-overrides ',xterm-ghostty:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',xterm-ghostty:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -as terminal-overrides ',xterm-ghostty:Se=\E[0 q'

set -g status-position top
set -g status 2
set -g 'status-format[1]' ''
set -g status-interval 5
set -g status-style "bg=default,fg=#505050"
set -g status-left-length 40
set -g status-right-length 40
set -g status-justify absolute-centre

# vesper
set -g status-left "#{?client_prefix,#[fg=#99FFE4 bold]●,#[fg=#303030]●}#{?window_zoomed_flag, #[fg=#FFC799]Z,} #[fg=#505050]#{session_name}"
# mono
# set -g status-left "#{?client_prefix,#[fg=#EBEBEB bold]●,#[fg=#303030]●}#{?window_zoomed_flag, #[fg=#EBEBEB]Z,} #[fg=#505050]#{session_name}"
set -g status-right ""

set -g automatic-rename-format "#{?#{m/r:^[0-9]+\\.[0-9]+\\.[0-9]+$,#{pane_current_command}},claude,#{pane_current_command}}"

setw -g window-status-format "#[fg=#505050] #I:#W#{?window_last_flag,-,}#{?window_bell_flag,!,} "
# vesper
setw -g window-status-current-format "#[fg=#FFC799,bold] #I:#W* "
# mono
# setw -g window-status-current-format "#[fg=#EBEBEB,bold] #I:#W* "
setw -g window-status-separator "#[fg=#2A2A2A]"

set -g popup-border-style "fg=#505050"
set -g popup-border-lines rounded

set -g pane-border-style "fg=#2A2A2A"
set -g pane-active-border-style "fg=#505050"

# vesper
set -g message-style "fg=#FFC799,bg=default"
# mono
# set -g message-style "fg=#EBEBEB,bg=default"
set -g mode-style "bg=#282828,fg=#d4d4d4"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'MunifTanjim/tmux-suspend'

set -g @yank_action copy-pipe-no-clear
set -g @resurrect-capture-pane-contents 'off'
set -g @resurrect-strategy-nvim 'session'

set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

set -g @fingers-key F
set -g @fingers-keyboard-layout qwerty

set -g @fzf-url-bind u
set -g @fzf-url-history-limit 2000

set -g @suspend_key F12

# tpm
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"
run '~/.config/tmux/plugins/tpm/tpm'

bind v copy-mode \; send-keys -X top-line \; send-keys -X select-line \; send-keys -X bottom-line
bind Y run-shell "tmux capture-pane -pS - | pbcopy" \; display-message "Buffer copied"
bind -T copy-mode-vi y send-keys -X copy-pipe-no-clear "pbcopy" \; display-message "Yanked!"

gui:
  nerdFontsVersion: "3"
  sidePanelWidth: 0.28
  theme:
    activeBorderColor:
      - "#ffc799"
      - bold
    inactiveBorderColor:
      - "#505050"
    optionsTextColor:
      - "#99ffe4"
    selectedLineBgColor:
      - "#232323"
    defaultFgColor:
      - "#ffffff"
    unstagedChangesColor:
      - "#ff8080"
    searchingActiveBorderColor:
      - "#ffc799"
      - bold
    cherryPickedCommitBgColor:
      - "#ffcfa8"
    cherryPickedCommitFgColor:
      - "#99ffe4"
git:
  overrideGpg: false
  pagers:
    - pager: 'delta --paging=never --features=no-side-by-side --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"'
    - pager: 'delta --paging=never --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"'
customCommands:
  - key: "C"
    context: "files"
    description: "Conventional commit (via quill-cc)"
    command: "quill-cc"
    output: "terminal"

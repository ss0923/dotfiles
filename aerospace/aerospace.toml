config-version = 2

start-at-login = true

after-login-command = []
after-startup-command = []

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

automatically-unhide-macos-hidden-apps = false

# Flex workspaces (1-5) for scratch/one-offs, plus pinned letter workspaces for apps.
# T=Terminal, W=Web, I=IDE, N=Notes, M=Music, Z=Zoom, P=Postman+Postico, G=Figma, D=Asana
persistent-workspaces = ['1', '2', '3', '4', '5', 'T', 'W', 'I', 'N', 'M', 'Z', 'P', 'G', 'D']

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.top = 8
outer.bottom = 8

[mode.main.binding]
ctrl-alt-shift-cmd-h = 'focus left'
ctrl-alt-shift-cmd-j = 'focus down'
ctrl-alt-shift-cmd-k = 'focus up'
ctrl-alt-shift-cmd-l = 'focus right'

ctrl-alt-shift-cmd-1 = 'workspace 1'
ctrl-alt-shift-cmd-2 = 'workspace 2'
ctrl-alt-shift-cmd-3 = 'workspace 3'
ctrl-alt-shift-cmd-4 = 'workspace 4'
ctrl-alt-shift-cmd-5 = 'workspace 5'

# Pinned letter workspaces (apps auto-land here via on-window-detected rules below)
ctrl-alt-shift-cmd-t = 'workspace T'   # Terminal (Ghostty)
ctrl-alt-shift-cmd-w = 'workspace W'   # Web (Chrome)
ctrl-alt-shift-cmd-i = 'workspace I'   # IDE (IntelliJ / VS Code)
ctrl-alt-shift-cmd-n = 'workspace N'   # Notes (Obsidian)
ctrl-alt-shift-cmd-m = 'workspace M'   # Music (Spotify)
ctrl-alt-shift-cmd-z = 'workspace Z'   # Zoom
ctrl-alt-shift-cmd-p = 'workspace P'   # Postman + Postico
ctrl-alt-shift-cmd-g = 'workspace G'   # Graphics (Figma)
ctrl-alt-shift-cmd-d = 'workspace D'   # Do/tasks (Asana)

cmd-alt-shift-h = 'move left'
cmd-alt-shift-j = 'move down'
cmd-alt-shift-k = 'move up'
cmd-alt-shift-l = 'move right'

cmd-alt-shift-1 = 'move-node-to-workspace 1'
cmd-alt-shift-2 = 'move-node-to-workspace 2'
cmd-alt-shift-3 = 'move-node-to-workspace 3'
cmd-alt-shift-4 = 'move-node-to-workspace 4'
cmd-alt-shift-5 = 'move-node-to-workspace 5'

# Move focused window to pinned letter workspace
cmd-alt-shift-t = 'move-node-to-workspace T'
cmd-alt-shift-w = 'move-node-to-workspace W'
cmd-alt-shift-i = 'move-node-to-workspace I'
cmd-alt-shift-n = 'move-node-to-workspace N'
cmd-alt-shift-m = 'move-node-to-workspace M'
cmd-alt-shift-z = 'move-node-to-workspace Z'
cmd-alt-shift-p = 'move-node-to-workspace P'
cmd-alt-shift-g = 'move-node-to-workspace G'
cmd-alt-shift-d = 'move-node-to-workspace D'

ctrl-alt-shift-cmd-f = 'fullscreen'
cmd-alt-shift-f = 'layout floating tiling'
cmd-alt-shift-space = 'layout floating tiling'

ctrl-alt-shift-cmd-slash = 'layout tiles horizontal vertical'
ctrl-alt-shift-cmd-comma = 'layout accordion horizontal vertical'

cmd-alt-shift-minus = 'resize smart -50'
cmd-alt-shift-equal = 'resize smart +50'

ctrl-alt-shift-cmd-a = 'focus-back-and-forth'
ctrl-alt-shift-cmd-tab = 'workspace-back-and-forth'

cmd-alt-shift-q = 'close'

cmd-alt-shift-semicolon = 'flatten-workspace-tree'

cmd-alt-shift-leftSquareBracket = 'join-with left'
cmd-alt-shift-rightSquareBracket = 'join-with right'

ctrl-alt-shift-cmd-r = 'mode resize'
ctrl-alt-shift-cmd-b = 'exec-and-forget ~/.config/aerospace/layouts/tcl-shotts.sh'

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
minus = 'resize smart -50'
equal = 'resize smart +50'
enter = 'mode main'
esc = 'mode main'

# ===== Auto-assign apps to pinned letter workspaces =====
# Run `aerospace list-apps` to confirm bundle IDs if adding more apps.

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace T'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij'
run = 'move-node-to-workspace I'

[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij.ce'
run = 'move-node-to-workspace I'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace I'

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace N'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace M'

[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = 'move-node-to-workspace Z'

[[on-window-detected]]
if.app-id = 'com.postmanlabs.mac'
run = 'move-node-to-workspace P'

[[on-window-detected]]
if.app-id = 'at.eggerapps.Postico'
run = 'move-node-to-workspace P'

[[on-window-detected]]
if.app-id = 'com.figma.Desktop'
run = 'move-node-to-workspace G'

[[on-window-detected]]
if.app-id = 'com.electron.asana'
run = 'move-node-to-workspace D'

# Docker Desktop UI — rarely needed, keep it out of tiling
[[on-window-detected]]
if.app-id = 'com.electron.dockerdesktop'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.docker.docker'
run = 'layout floating'

# ===== Floating utility apps =====

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
check-further-callbacks = true
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.raycast.macos'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Stickies'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.colliderli.iina'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.KeyboardSetupAssistant'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.logi.optionsplus'
run = 'layout floating'
